name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  # Redeploy when a new GitHub Release is cut so MkDocs Material's version badge
  # (driven by the GitHub API lookup against repo_url) refreshes to the latest
  # module version instead of remaining stuck on whatever was latest at last push.
  release:
    types: [published]
  workflow_dispatch:

# Serialise all Pages deployments for this repo so push-to-main and release events
# can never race each other. cancel-in-progress: false queues the second run rather
# than cancelling it, which prevents missed deployments.
concurrency:
  group: pages
  cancel-in-progress: false

# Reusable workflow needs pages:write + id-token:write for actions/deploy-pages@v4.
# Caller must grant these explicitly or the run fails during startup validation.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    uses: AzureLocal/platform/.github/workflows/reusable-mkdocs-deploy.yml@main
    with:
      pip-packages: 'mkdocs-material mkdocs-drawio'
