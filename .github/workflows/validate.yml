name: Validate

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  docs-build:
    name: Docs build check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material mkdocs-drawio

      - run: mkdocs build --strict

  module-ci:
    uses: AzureLocal/platform/.github/workflows/reusable-ps-module-ci.yml@main
    with:
      module-manifest: AzureLocalRanger.psd1
      run-psscriptanalyzer: true
      psscriptanalyzer-path: Modules
      run-pester: true
      pester-test-path: tests/maproom/unit
      validate-maproom: false
