name: Validate

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-build:
    name: Docs build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material mkdocs-drawio

      - run: mkdocs build --strict

  psscriptanalyzer:
    name: module-ci / PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path Modules -Recurse -Severity Warning,Error
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($results) { $results | Format-Table -AutoSize }
          if ($errors.Count -gt 0) {
            throw "PSScriptAnalyzer found $($errors.Count) blocking error(s)."
          }
          Write-Host "PSScriptAnalyzer: no blocking errors."

  pester-unit:
    name: module-ci / Pester Unit Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.6.0 -Force -Scope CurrentUser
          Install-Module powershell-yaml -Force -Scope CurrentUser

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest -Path .\AzureLocalRanger.psd1 | Out-Null

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module "$env:GITHUB_WORKSPACE\AzureLocalRanger.psd1" -Force
          New-Item -ItemType Directory -Force -Path TestResults | Out-Null
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/maproom/unit'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'TestResults\pester-results.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester: $($result.FailedCount) test(s) failed."
            exit 1
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: TestResults\pester-results.xml
