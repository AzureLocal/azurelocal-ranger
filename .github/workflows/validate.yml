name: Validate

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  validate-docs-and-module:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate MkDocs build
        run: mkdocs build --strict

      - name: Validate module manifest
        shell: pwsh
        run: |
          Test-ModuleManifest -Path ./AzureLocalRanger.psd1 | Out-Null

      - name: Import root module
        shell: pwsh
        run: |
          Import-Module ./AzureLocalRanger.psd1 -Force
          Get-Module AzureLocalRanger | Format-List Name,Version,Path