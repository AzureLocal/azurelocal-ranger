name: CI

on:
  push:
    branches: [main]

jobs:
  module-ci:
    uses: AzureLocal/platform/.github/workflows/reusable-ps-module-ci.yml@main
    with:
      module-manifest: AzureLocalRanger.psd1
      run-psscriptanalyzer: true
      psscriptanalyzer-path: Modules
      run-pester: true
      pester-test-path: tests/maproom/unit
      validate-maproom: false
