name: Publish to PSGallery

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual Publish-Module call)'
        required: false
        default: 'true'

permissions:
  # contents: write is required to create the GitHub Release on workflow_dispatch so
  # the docs site's repo-version badge (MkDocs Material reads the latest release via
  # the GitHub API) picks up the new module version automatically.
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path ./AzureLocalRanger.psd1 -ErrorAction Stop
          Write-Host "Module: $($manifest.Name) v$($manifest.Version)"

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0
          Install-Module powershell-yaml -Force -Scope CurrentUser
          Import-Module ./AzureLocalRanger.psd1 -Force
          $result = Invoke-Pester -Path ./tests -PassThru -Output Minimal
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) Pester test(s) failed. Aborting publish."
          }

      - name: Publish to PSGallery
        if: ${{ github.event_name == 'release' || github.event.inputs.dry_run == 'false' }}
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            throw 'PSGALLERY_API_KEY secret is not set. Cannot publish.'
          }
          # Stage only the module payload expected by PowerShell Gallery.
          $stagingDir = Join-Path $env:RUNNER_TEMP 'staging' 'AzureLocalRanger'
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          foreach ($item in @('AzureLocalRanger.psd1','AzureLocalRanger.psm1','Modules','en-US','LICENSE','README.md')) {
            $src = Join-Path $env:GITHUB_WORKSPACE $item
            if (Test-Path $src) {
              Copy-Item -Path $src -Destination $stagingDir -Recurse -Force
            }
          }
          $manifest = Test-ModuleManifest -Path (Join-Path $stagingDir 'AzureLocalRanger.psd1') -ErrorAction Stop
          $existing = $null
          try {
            $existing = Find-Module -Name $manifest.Name -Repository PSGallery -RequiredVersion $manifest.Version -ErrorAction Stop
          }
          catch {
            $existing = $null
          }
          if ($existing) {
            Write-Host "Module $($manifest.Name) v$($manifest.Version) is already published to PSGallery. Skipping publish."
            exit 0
          }
          Publish-Module -Path $stagingDir -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Verbose

      - name: Create matching GitHub Release (if missing)
        # Only runs when we actually published — skips during dry-run or when the
        # workflow was triggered by a pre-existing `release` event. Keeps the docs
        # site version badge and the PSGallery version in lockstep.
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $manifest = Test-ModuleManifest -Path ./AzureLocalRanger.psd1 -ErrorAction Stop
          $tag = "v$($manifest.Version)"
          $existing = gh release view $tag --json tagName 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "GitHub Release $tag already exists — skipping create."
            exit 0
          }

          # Extract the matching CHANGELOG section as the release body.
          $changelog = Get-Content ./CHANGELOG.md -Raw
          $pattern = '(?sm)^## \[' + [regex]::Escape([string]$manifest.Version) + '\].*?(?=^## \[|\z)'
          $match = [regex]::Match($changelog, $pattern)
          $body = if ($match.Success) {
            ($match.Value -split "`n", 2)[1].Trim()
          } else {
            "See CHANGELOG.md for details."
          }
          $bodyPath = Join-Path $env:RUNNER_TEMP "release-body-$tag.md"
          $body | Set-Content -Path $bodyPath -Encoding UTF8

          # Derive a human title from the first H2 milestone banner if present.
          $title = "v$($manifest.Version)"
          gh release create $tag --target main --title $title --notes-file $bodyPath
          Write-Host "Created GitHub Release $tag."

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run complete — module validated and tests passed, but Publish-Module was not called."
