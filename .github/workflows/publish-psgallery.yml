name: Publish to PSGallery

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual Publish-Module call)'
        required: false
        default: 'true'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path ./AzureLocalRanger.psd1 -ErrorAction Stop
          Write-Host "Module: $($manifest.Name) v$($manifest.Version)"

      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0
          Install-Module powershell-yaml -Force -Scope CurrentUser
          Import-Module ./AzureLocalRanger.psd1 -Force
          $result = Invoke-Pester -Path ./tests -PassThru -Output Minimal
          if ($result.FailedCount -gt 0) {
            throw "$($result.FailedCount) Pester test(s) failed. Aborting publish."
          }

      - name: Publish to PSGallery
        if: ${{ github.event_name == 'release' || github.event.inputs.dry_run == 'false' }}
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if (-not $env:PSGALLERY_API_KEY) {
            throw 'PSGALLERY_API_KEY secret is not set. Cannot publish.'
          }
          # Stage only the module payload expected by PowerShell Gallery.
          $stagingDir = Join-Path $env:RUNNER_TEMP 'staging' 'AzureLocalRanger'
          New-Item -ItemType Directory -Path $stagingDir -Force | Out-Null
          foreach ($item in @('AzureLocalRanger.psd1','AzureLocalRanger.psm1','Modules','en-US','LICENSE','README.md')) {
            $src = Join-Path $env:GITHUB_WORKSPACE $item
            if (Test-Path $src) {
              Copy-Item -Path $src -Destination $stagingDir -Recurse -Force
            }
          }
          $manifest = Test-ModuleManifest -Path (Join-Path $stagingDir 'AzureLocalRanger.psd1') -ErrorAction Stop
          $existing = $null
          try {
            $existing = Find-Module -Name $manifest.Name -Repository PSGallery -RequiredVersion $manifest.Version -ErrorAction Stop
          }
          catch {
            $existing = $null
          }
          if ($existing) {
            Write-Host "Module $($manifest.Name) v$($manifest.Version) is already published to PSGallery. Skipping publish."
            exit 0
          }
          Publish-Module -Path $stagingDir -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Verbose

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "Dry run complete — module validated and tests passed, but Publish-Module was not called."
