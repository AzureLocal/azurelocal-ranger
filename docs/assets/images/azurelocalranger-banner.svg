<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bgBanner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003A70;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A86D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A86D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A70;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="compassGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#50B4FF;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:0" />
    </radialGradient>
    <filter id="dropshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#001A3A" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="160" rx="16" ry="16" fill="url(#bgBanner)"/>

  <!-- Subtle terrain grid -->
  <g opacity="0.06" stroke="white" stroke-width="0.7">
    <line x1="0" y1="40" x2="640" y2="40"/>
    <line x1="0" y1="80" x2="640" y2="80"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="160" y1="0" x2="160" y2="160"/>
    <line x1="320" y1="0" x2="320" y2="160"/>
    <line x1="480" y1="0" x2="480" y2="160"/>
  </g>

  <!-- Icon area background (left panel) -->
  <rect x="16" y="16" width="145" height="128" rx="20" fill="url(#bgIcon)" opacity="0.7"/>

  <!-- Ranger chevron badge -->
  <g transform="translate(89,30)" filter="url(#dropshadow)">
    <polygon points="0,-12 12,-4 8,10 0,6 -8,10 -12,-4"
      fill="#00B294" stroke="#008F76" stroke-width="0.8"/>
    <text x="0" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold"
      font-size="7" fill="white">R</text>
  </g>

  <!-- Compass body -->
  <g filter="url(#dropshadow)">
    <!-- Outer ring -->
    <circle cx="89" cy="90" r="38" fill="white"/>

    <!-- Inner face -->
    <circle cx="89" cy="90" r="32" fill="url(#bgIcon)"/>
    <circle cx="89" cy="90" r="32" fill="url(#compassGlow)"/>

    <!-- Degree marks -->
    <g stroke="white" stroke-width="1" opacity="0.4">
      <line x1="89" y1="60" x2="89" y2="65"/>
      <line x1="89" y1="115" x2="89" y2="120"/>
      <line x1="59" y1="90" x2="64" y2="90"/>
      <line x1="114" y1="90" x2="119" y2="90"/>
    </g>

    <!-- Intercardinal marks -->
    <g stroke="white" stroke-width="0.6" opacity="0.25">
      <line x1="110" y1="69" x2="107" y2="72"/>
      <line x1="68" y1="69" x2="71" y2="72"/>
      <line x1="110" y1="111" x2="107" y2="108"/>
      <line x1="68" y1="111" x2="71" y2="108"/>
    </g>

    <!-- Compass rose / needle -->
    <!-- North needle (teal) -->
    <polygon points="89,62 84,90 89,85 94,90" fill="#00B294" opacity="0.95"/>
    <!-- South needle (white faded) -->
    <polygon points="89,118 84,90 89,95 94,90" fill="white" opacity="0.5"/>
    <!-- East-West subtle line -->
    <line x1="64" y1="90" x2="114" y2="90" stroke="white" stroke-width="0.8" opacity="0.3"/>

    <!-- Cardinal letters -->
    <text x="89" y="73" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
      font-weight="bold" font-size="7" fill="white" opacity="0.9">N</text>
    <text x="89" y="112" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
      font-weight="bold" font-size="6" fill="white" opacity="0.5">S</text>
    <text x="70" y="93" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
      font-weight="bold" font-size="6" fill="white" opacity="0.5">W</text>
    <text x="108" y="93" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
      font-weight="bold" font-size="6" fill="white" opacity="0.5">E</text>

    <!-- Center pin -->
    <circle cx="89" cy="90" r="3.5" fill="#00B294" stroke="white" stroke-width="1"/>

    <!-- Outer ring highlight -->
    <circle cx="89" cy="90" r="32" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Divider line -->
  <line x1="175" y1="24" x2="175" y2="136" stroke="white" stroke-width="0.8" opacity="0.25"/>

  <!-- Title text -->
  <text x="197" y="62" font-family="'Segoe UI', Arial, sans-serif" font-weight="700"
    font-size="34" fill="white" letter-spacing="-0.5" filter="url(#dropshadow)">Azure Local</text>
  <text x="197" y="110" font-family="'Segoe UI', Arial, sans-serif" font-weight="700"
    font-size="46" fill="#00B294" letter-spacing="1" filter="url(#dropshadow)">Ranger</text>

  <!-- Tagline -->
  <text x="197" y="138" font-family="'Segoe UI', Arial, sans-serif" font-style="italic"
    font-size="14" fill="white" opacity="0.7" letter-spacing="0.5">Know your ground truth.</text>

  <!-- Version badge -->
  <rect x="490" y="118" width="118" height="24" rx="12" fill="white" opacity="0.12"/>
  <text x="549" y="134" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
    font-size="12" fill="white" opacity="0.8" letter-spacing="0.5">PowerShell Module</text>

  <!-- Decorative dots top right -->
  <g fill="white" opacity="0.15">
    <circle cx="580" cy="28" r="3"/>
    <circle cx="595" cy="28" r="3"/>
    <circle cx="610" cy="28" r="3"/>
    <circle cx="587" cy="42" r="3"/>
    <circle cx="602" cy="42" r="3"/>
    <circle cx="617" cy="42" r="3"/>
  </g>
</svg>