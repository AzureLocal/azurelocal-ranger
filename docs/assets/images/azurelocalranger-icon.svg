<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A86D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A70;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="compassGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#50B4FF;stop-opacity:0.35" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#001A3A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="38" ry="38" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines (terrain map feel) -->
  <g opacity="0.08" stroke="white" stroke-width="0.8">
    <line x1="0" y1="50" x2="200" y2="50"/>
    <line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="150" x2="200" y2="150"/>
    <line x1="50" y1="0" x2="50" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
  </g>

  <!-- Ranger chevron badge (top center) -->
  <g transform="translate(100,32)" filter="url(#shadow)">
    <polygon points="0,-14 14,-5 10,12 0,7 -10,12 -14,-5"
      fill="#00B294" stroke="#008F76" stroke-width="0.8"/>
    <text x="0" y="3" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold"
      font-size="9" fill="white">R</text>
  </g>

  <!-- Compass body -->
  <g filter="url(#shadow)">
    <!-- Outer ring -->
    <circle cx="100" cy="100" r="46" fill="white"/>

    <!-- Inner face -->
    <circle cx="100" cy="100" r="38" fill="url(#bgGrad)"/>
    <circle cx="100" cy="100" r="38" fill="url(#compassGlow)"/>

    <!-- Cardinal degree marks -->
    <g stroke="white" stroke-width="1.2" opacity="0.5">
      <line x1="100" y1="64" x2="100" y2="70"/>
      <line x1="100" y1="130" x2="100" y2="136"/>
      <line x1="64" y1="100" x2="70" y2="100"/>
      <line x1="130" y1="100" x2="136" y2="100"/>
    </g>

    <!-- Intercardinal marks -->
    <g stroke="white" stroke-width="0.7" opacity="0.3">
      <line x1="125" y1="75" x2="122" y2="78"/>
      <line x1="75" y1="75" x2="78" y2="78"/>
      <line x1="125" y1="125" x2="122" y2="122"/>
      <line x1="75" y1="125" x2="78" y2="122"/>
    </g>

    <!-- Compass rose / needle -->
    <!-- North needle (teal) -->
    <polygon points="100,66 95,100 100,94 105,100" fill="#00B294" opacity="0.95"/>
    <!-- South needle (white faded) -->
    <polygon points="100,134 95,100 100,106 105,100" fill="white" opacity="0.45"/>
    <!-- East-West subtle line -->
    <line x1="70" y1="100" x2="130" y2="100" stroke="white" stroke-width="0.8" opacity="0.3"/>

    <!-- Cardinal letters -->
    <text x="100" y="81" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
      font-weight="bold" font-size="8" fill="white" opacity="0.9">N</text>
    <text x="100" y="124" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
      font-weight="bold" font-size="7" fill="white" opacity="0.5">S</text>
    <text x="77" y="103" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
      font-weight="bold" font-size="7" fill="white" opacity="0.5">W</text>
    <text x="123" y="103" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
      font-weight="bold" font-size="7" fill="white" opacity="0.5">E</text>

    <!-- Center pin -->
    <circle cx="100" cy="100" r="4" fill="#00B294" stroke="white" stroke-width="1.2"/>

    <!-- Outer ring highlight -->
    <circle cx="100" cy="100" r="38" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Bottom label -->
  <text x="100" y="168" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
    font-weight="bold" font-size="13" fill="white" letter-spacing="1" opacity="0.95">AZURE LOCAL</text>
  <text x="100" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif"
    font-weight="bold" font-size="15" fill="#00B294" letter-spacing="2" opacity="0.95">RANGER</text>
</svg>