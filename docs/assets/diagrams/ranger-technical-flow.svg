<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2120" viewBox="0 0 1800 2120" role="img" aria-labelledby="title desc">
  <title id="title">Azure Local Ranger technical runtime flow</title>
  <desc id="desc">Seven-phase technical flow for Invoke-AzureLocalRanger showing input resolution, credential handling, collector execution, manifest validation, drift detection, and rendering.</desc>
  <style>
    text { font-family: Segoe UI, Arial, sans-serif; fill: #1f2937; }
    .phase { stroke-width: 2; rx: 8; ry: 8; }
    .box { stroke-width: 1.5; rx: 8; ry: 8; }
    .decision { stroke-width: 1.5; }
    .label { font-size: 22px; font-weight: 700; }
    .body { font-size: 15px; }
    .small { font-size: 13px; }
    .line { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .dashed { stroke-dasharray: 8 6; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569" />
    </marker>
  </defs>

  <rect x="20" y="20" width="1760" height="250" fill="#d9eaf7" stroke="#5b9bd5" class="phase" />
  <text x="40" y="55" class="label">Phase 1 - Invocation and Input Resolution</text>
  <rect x="40" y="85" width="220" height="56" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="64" y="118" class="body">Invoke-AzureLocalRanger</text>
  <polygon points="340,82 410,120 340,158 270,120" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="292" y="115" class="small">Config input?</text>
  <rect x="460" y="85" width="220" height="56" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="490" y="110" class="body">Import-RangerConfiguration</text>
  <text x="520" y="128" class="body">Merge-RangerConfig</text>
  <rect x="730" y="85" width="220" height="56" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="760" y="110" class="body">Invoke-RangerInteractiveInput</text>
  <text x="796" y="128" class="small">only when allowed</text>
  <rect x="1000" y="85" width="200" height="56" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="1042" y="118" class="body">Test-RangerConfiguration</text>
  <polygon points="1290,82 1360,120 1290,158 1220,120" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="1262" y="115" class="small">Valid?</text>
  <rect x="1410" y="85" width="220" height="56" fill="#fceaea" stroke="#b85450" class="box" />
  <text x="1460" y="118" class="body">Throw validation errors</text>
  <line x1="260" y1="113" x2="270" y2="113" class="line" />
  <line x1="410" y1="120" x2="460" y2="113" class="line" />
  <line x1="680" y1="113" x2="730" y2="113" class="line" />
  <line x1="950" y1="113" x2="1000" y2="113" class="line" />
  <line x1="1200" y1="113" x2="1220" y2="113" class="line" />
  <line x1="1360" y1="120" x2="1410" y2="113" class="line dashed" />

  <rect x="20" y="290" width="1760" height="220" fill="#d9eaf7" stroke="#5b9bd5" class="phase" />
  <text x="40" y="325" class="label">Phase 2 - Credential Resolution</text>
  <rect x="40" y="355" width="220" height="56" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="76" y="388" class="body">Resolve-RangerCredentialMap</text>
  <polygon points="360,350 435,383 360,416 285,383" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="308" y="378" class="small">Override or inline</text>
  <text x="327" y="394" class="small">credential?</text>
  <rect x="500" y="355" width="250" height="56" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="544" y="380" class="body">Resolve-RangerPasswordValue</text>
  <text x="550" y="398" class="small">Get-RangerSecretFromUri</text>
  <rect x="790" y="345" width="290" height="76" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="842" y="373" class="body">Connect-RangerAzureContext</text>
  <text x="818" y="392" class="small">existing-context / SP / MI / CLI fallback</text>
  <polygon points="1180,350 1255,383 1180,416 1105,383" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="1147" y="378" class="small">Prompt</text>
  <text x="1138" y="394" class="small">allowed?</text>
  <rect x="1320" y="355" width="170" height="56" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="1364" y="388" class="body">Get-Credential</text>
  <rect x="1540" y="355" width="190" height="56" fill="#e8f5e4" stroke="#70ad47" class="box" />
  <text x="1585" y="388" class="body">Return credential map</text>
  <line x1="260" y1="383" x2="285" y2="383" class="line" />
  <line x1="435" y1="383" x2="500" y2="383" class="line" />
  <line x1="750" y1="383" x2="790" y2="383" class="line" />
  <line x1="1080" y1="383" x2="1105" y2="383" class="line" />
  <line x1="1255" y1="383" x2="1320" y2="383" class="line dashed" />
  <line x1="1490" y1="383" x2="1540" y2="383" class="line" />

  <rect x="20" y="530" width="1760" height="210" fill="#fff2cc" stroke="#d6b656" class="phase" />
  <text x="40" y="565" class="label">Phase 3 - Domain and Collector Selection</text>
  <rect x="40" y="595" width="260" height="56" fill="#fff8dd" stroke="#d6b656" class="box" />
  <text x="86" y="628" class="body">Resolve-RangerSelectedCollectors</text>
  <rect x="340" y="595" width="220" height="56" fill="#fff8dd" stroke="#d6b656" class="box" />
  <text x="384" y="628" class="body">Apply include / exclude</text>
  <polygon points="660,590 735,623 660,656 585,623" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="612" y="618" class="small">Required targets</text>
  <text x="625" y="634" class="small">configured?</text>
  <rect x="810" y="585" width="260" height="76" fill="#fceaea" stroke="#b85450" class="box" />
  <text x="854" y="612" class="body">Drop optional collector</text>
  <text x="842" y="630" class="small">or abort core collector run</text>
  <rect x="1120" y="595" width="220" height="56" fill="#e8f5e4" stroke="#70ad47" class="box" />
  <text x="1170" y="628" class="body">Selected collector list</text>
  <line x1="300" y1="623" x2="340" y2="623" class="line" />
  <line x1="560" y1="623" x2="585" y2="623" class="line" />
  <line x1="735" y1="623" x2="810" y2="623" class="line dashed" />
  <line x1="735" y1="623" x2="1120" y2="623" class="line" />

  <rect x="20" y="760" width="1760" height="220" fill="#e2f0d9" stroke="#70ad47" class="phase" />
  <text x="40" y="795" class="label">Phase 4 - Runtime Initialization</text>
  <rect x="40" y="825" width="220" height="56" fill="#eef8ec" stroke="#70ad47" class="box" />
  <text x="95" y="858" class="body">New-RangerPackageRoot</text>
  <rect x="300" y="825" width="220" height="56" fill="#eef8ec" stroke="#70ad47" class="box" />
  <text x="368" y="850" class="body">Resolve-RangerPath</text>
  <text x="358" y="868" class="body">Create package folder</text>
  <rect x="560" y="825" width="220" height="56" fill="#eef8ec" stroke="#70ad47" class="box" />
  <text x="608" y="850" class="body">Initialize-RangerFileLog</text>
  <text x="628" y="868" class="body">Start-Transcript</text>
  <rect x="820" y="825" width="200" height="56" fill="#fdf1e8" stroke="#ed7d31" class="box" />
  <text x="875" y="858" class="body">New-RangerManifest</text>
  <polygon points="1120,820 1195,853 1120,886 1045,853" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="1071" y="848" class="small">Baseline manifest</text>
  <text x="1088" y="864" class="small">requested?</text>
  <rect x="1270" y="825" width="250" height="56" fill="#fdf1e8" stroke="#ed7d31" class="box" />
  <text x="1337" y="858" class="body">Prepare drift comparison path</text>
  <line x1="260" y1="853" x2="300" y2="853" class="line" />
  <line x1="520" y1="853" x2="560" y2="853" class="line" />
  <line x1="780" y1="853" x2="820" y2="853" class="line" />
  <line x1="1020" y1="853" x2="1045" y2="853" class="line" />
  <line x1="1195" y1="853" x2="1270" y2="853" class="line" />

  <rect x="20" y="1000" width="1760" height="350" fill="#e2f0d9" stroke="#70ad47" class="phase" />
  <text x="40" y="1035" class="label">Phase 5 - Collector Execution Loop</text>
  <rect x="40" y="1065" width="170" height="56" fill="#eef8ec" stroke="#70ad47" class="box" />
  <text x="94" y="1098" class="body">For each collector</text>
  <rect x="240" y="1065" width="230" height="56" fill="#eef8ec" stroke="#70ad47" class="box" />
  <text x="286" y="1098" class="body">Invoke-RangerCollectorExecution</text>
  <polygon points="570,1060 650,1093 570,1126 490,1093" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="529" y="1088" class="small">Transport path?</text>
  <text x="512" y="1104" class="small">WinRM / Azure / Redfish</text>
  <rect x="710" y="1055" width="220" height="76" fill="#eef8ec" stroke="#70ad47" class="box" />
  <text x="756" y="1082" class="body">Invoke-RangerRemoteCommand</text>
  <text x="786" y="1100" class="body">Invoke-RangerRetry</text>
  <rect x="970" y="1055" width="220" height="76" fill="#eef8ec" stroke="#70ad47" class="box" />
  <text x="1029" y="1082" class="body">Invoke-RangerAzureQuery</text>
  <text x="1013" y="1100" class="small">429 / 503 retry loop</text>
  <rect x="1230" y="1055" width="220" height="76" fill="#eef8ec" stroke="#70ad47" class="box" />
  <text x="1282" y="1082" class="body">Invoke-RangerRedfishRequest</text>
  <text x="1315" y="1100" class="body">Retry loop</text>
  <rect x="1490" y="1055" width="250" height="76" fill="#fff8dd" stroke="#d6b656" class="box" />
  <text x="1532" y="1082" class="body">Invoke-RangerSafeAction</text>
  <text x="1518" y="1100" class="small">transient? retry : permanent?</text>
  <text x="1584" y="1118" class="small">default value</text>
  <rect x="310" y="1180" width="240" height="70" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="352" y="1208" class="body">Resolve-RangerNodeInventory</text>
  <text x="380" y="1226" class="small">Arc-first node resolution</text>
  <rect x="610" y="1180" width="250" height="70" fill="#eef6fc" stroke="#5b9bd5" class="box" />
  <text x="653" y="1208" class="body">Resolve-RangerDomainContext</text>
  <text x="687" y="1226" class="small">workgroup fallback</text>
  <rect x="930" y="1180" width="260" height="70" fill="#fdf1e8" stroke="#ed7d31" class="box" />
  <text x="966" y="1208" class="body">Add-RangerCollectorToManifest</text>
  <text x="982" y="1226" class="small">status, messages, domains, evidence</text>
  <line x1="210" y1="1093" x2="240" y2="1093" class="line" />
  <line x1="470" y1="1093" x2="490" y2="1093" class="line" />
  <line x1="650" y1="1093" x2="710" y2="1093" class="line" />
  <line x1="650" y1="1093" x2="970" y2="1093" class="line" />
  <line x1="650" y1="1093" x2="1230" y2="1093" class="line" />
  <line x1="930" y1="1093" x2="1490" y2="1093" class="line dashed" />
  <line x1="430" y1="1121" x2="430" y2="1180" class="line" />
  <line x1="735" y1="1121" x2="735" y2="1180" class="line" />
  <line x1="1060" y1="1121" x2="1060" y2="1180" class="line" />

  <rect x="20" y="1370" width="1760" height="250" fill="#fce4d6" stroke="#ed7d31" class="phase" />
  <text x="40" y="1405" class="label">Phase 6 - Manifest Assembly and Validation</text>
  <rect x="40" y="1435" width="250" height="56" fill="#fdf1e8" stroke="#ed7d31" class="box" />
  <text x="83" y="1468" class="body">Set retry details and schema block</text>
  <rect x="330" y="1435" width="220" height="56" fill="#fdf1e8" stroke="#ed7d31" class="box" />
  <text x="379" y="1468" class="body">Test-RangerManifestSchema</text>
  <polygon points="650,1430 720,1463 650,1496 580,1463" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="620" y="1458" class="small">Valid?</text>
  <rect x="790" y="1435" width="200" height="56" fill="#fdf1e8" stroke="#ed7d31" class="box" />
  <text x="844" y="1468" class="body">Save-RangerManifest</text>
  <rect x="1030" y="1435" width="250" height="56" fill="#fdf1e8" stroke="#ed7d31" class="box" />
  <text x="1075" y="1460" class="body">New-RangerDriftReport</text>
  <text x="1062" y="1478" class="small">Write drift-report.json</text>
  <polygon points="1380,1430 1460,1463 1380,1496 1300,1463" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="1335" y="1458" class="small">failOnSchemaViolation?</text>
  <rect x="1530" y="1435" width="210" height="56" fill="#fceaea" stroke="#b85450" class="box" />
  <text x="1580" y="1460" class="body">Throw or continue</text>
  <text x="1598" y="1478" class="small">with warnings</text>
  <line x1="290" y1="1463" x2="330" y2="1463" class="line" />
  <line x1="550" y1="1463" x2="580" y2="1463" class="line" />
  <line x1="720" y1="1463" x2="790" y2="1463" class="line" />
  <line x1="990" y1="1463" x2="1030" y2="1463" class="line" />
  <line x1="1280" y1="1463" x2="1300" y2="1463" class="line" />
  <line x1="1460" y1="1463" x2="1530" y2="1463" class="line dashed" />

  <rect x="20" y="1640" width="1760" height="420" fill="#e4dfec" stroke="#8064a2" class="phase" />
  <text x="40" y="1675" class="label">Phase 7 - Rendering and Output</text>
  <polygon points="110,1710 180,1743 110,1776 40,1743" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="76" y="1738" class="small">NoRender?</text>
  <polygon points="300,1710 380,1743 300,1776 220,1743" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="243" y="1738" class="small">continueToRendering?</text>
  <rect x="430" y="1705" width="300" height="76" fill="#efe9f6" stroke="#8064a2" class="box" />
  <text x="481" y="1732" class="body">Invoke-RangerOutputGeneration</text>
  <text x="471" y="1750" class="small">HTML / Markdown / Office / diagrams</text>
  <rect x="780" y="1705" width="250" height="76" fill="#efe9f6" stroke="#8064a2" class="box" />
  <text x="835" y="1732" class="body">New-RangerPackageIndex</text>
  <text x="852" y="1750" class="small">Write run-status.json</text>
  <polygon points="1140,1710 1225,1743 1140,1776 1055,1743" fill="#fff2cc" stroke="#d6b656" class="decision" />
  <text x="1082" y="1738" class="small">Unattended + failed collectors?</text>
  <rect x="1290" y="1705" width="210" height="76" fill="#e8f5e4" stroke="#70ad47" class="box" />
  <text x="1360" y="1732" class="body">Terminal success</text>
  <text x="1351" y="1750" class="small">Package ready</text>
  <rect x="1540" y="1705" width="210" height="76" fill="#fceaea" stroke="#b85450" class="box" />
  <text x="1608" y="1732" class="body">Terminal failure</text>
  <text x="1578" y="1750" class="small">Partial package may exist</text>
  <line x1="180" y1="1743" x2="220" y2="1743" class="line" />
  <line x1="380" y1="1743" x2="430" y2="1743" class="line" />
  <line x1="730" y1="1743" x2="780" y2="1743" class="line" />
  <line x1="1030" y1="1743" x2="1055" y2="1743" class="line" />
  <line x1="1225" y1="1743" x2="1290" y2="1743" class="line" />
  <line x1="1225" y1="1743" x2="1540" y2="1743" class="line dashed" />

  <text x="40" y="1815" class="body">Function boundaries called out in the code path: Invoke-RangerRetry, Invoke-RangerSafeAction, Resolve-RangerNodeInventory, Resolve-RangerDomainContext, Test-RangerManifestSchema, and Invoke-RangerOutputGeneration.</text>
  <text x="40" y="1845" class="body">Dashed lines mark fallback, skip, and failure branches. Solid lines mark the primary happy path.</text>
</svg>