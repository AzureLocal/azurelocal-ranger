site_name: Azure Local Ranger
site_description: AzureLocalRanger — automated discovery, documentation, and reporting for Azure Local (formerly Azure Stack HCI) clusters
site_author: Azure Local Cloud
site_url: https://azurelocal.github.io/azurelocal-ranger/
repo_url: https://github.com/AzureLocal/azurelocal-ranger
repo_name: AzureLocal/azurelocal-ranger

theme:
  name: material
  logo: assets/images/azurelocalranger-icon.svg
  favicon: assets/images/azurelocalranger-icon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - md_in_html

plugins:
  - search

extra:
  analytics:
    provider: google
    property: G-2D9XDHSXJW
  social:
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/countrycloudboy
      name: CountryCloudBoy on X
    - icon: fontawesome/brands/github
      link: https://github.com/AzureLocal/azurelocal-ranger
      name: GitHub Repository
    - icon: fontawesome/solid/globe
      link: https://azurelocal.cloud
      name: Azure Local Community
  homepage: https://azurelocal.cloud

copyright: >-
  Copyright &copy; 2026 Azure Local. Designed and maintained by
  <a href="https://www.hybridsolutions.cloud">Hybrid Cloud Solutions</a>.

