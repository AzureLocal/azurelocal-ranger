site_name: Azure Local Ranger
site_description: AzureLocalRanger — automated discovery, documentation, and reporting for Azure Local (formerly Azure Stack HCI) clusters
site_author: Azure Local Cloud
site_url: https://azurelocal.github.io/azurelocal-ranger/
repo_url: https://github.com/AzureLocal/azurelocal-ranger
repo_name: AzureLocal/azurelocal-ranger

theme:
  name: material
  logo: assets/images/azurelocalranger-icon.svg
  favicon: assets/images/azurelocalranger-icon.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: blue
      accent: teal

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Product:
    - What Ranger Is: what-ranger-is.md
    - Ranger vs Scout: ranger-vs-scout.md
    - Scope Boundary: scope-boundary.md
    - Deployment Variants: deployment-variants.md
  - Architecture:
    - System Overview: architecture/system-overview.md
    - How Ranger Works: architecture/how-ranger-works.md
    - Audit Manifest: architecture/audit-manifest.md
    - Implementation Architecture: architecture/implementation-architecture.md
    - Configuration Model: architecture/configuration-model.md
    - Repository Design: architecture/repository-design.md
  - Discovery Domains:
    - Cluster and Node: discovery-domains/cluster-and-node.md
    - Hardware: discovery-domains/hardware.md
    - Storage: discovery-domains/storage.md
    - Networking: discovery-domains/networking.md
    - Virtual Machines: discovery-domains/virtual-machines.md
    - Identity and Security: discovery-domains/identity-and-security.md
    - Azure Integration: discovery-domains/azure-integration.md
    - OEM Integration: discovery-domains/oem-integration.md
    - Management Tools: discovery-domains/management-tools.md
    - Performance Baseline: discovery-domains/performance-baseline.md
  - Outputs:
    - Diagrams: outputs/diagrams.md
    - Reports: outputs/reports.md
    - As-Built Package: outputs/as-built-package.md
  - Operator Guide:
    - Quickstart: operator/quickstart.md
    - Prerequisites: prerequisites.md
    - Installation and First Run: operator/prerequisites.md
    - Authentication: operator/authentication.md
    - Configuration: operator/configuration.md
    - Command Reference: operator/command-reference.md
    - Troubleshooting: operator/troubleshooting.md
  - Project:
    - Status: project/status.md
    - Roadmap: project/roadmap.md
    - Documentation Roadmap: project/documentation-roadmap.md
    - Repository Structure: project/repository-structure.md
    - Changelog: project/changelog.md
  - Contributor:
    - Getting Started: contributor/getting-started.md
    - Simulation Testing: contributor/simulation-testing.md
    - Template Authoring: contributor/template-authoring.md
    - Contributing: contributor/contributing.md